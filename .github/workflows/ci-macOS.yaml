name: Build Syphon macOS Universal

permissions:
  contents: write

env:
  SYPHON_REVISION: "71351d4b484cd2d1917867f7846a5cdca724552d"
  SYPHON_REPO: "https://github.com/Syphon/Syphon-Framework.git"

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build Release Universal
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone Syphon Framework
        run: |
          git clone "$SYPHON_REPO" Syphon-Framework
          cd Syphon-Framework
          git checkout "$SYPHON_REVISION"

      - name: Apply patches
        run: |
          PATCHES=(patches/*.patch)
          if [ -f "${PATCHES[0]}" ]; then
            cd Syphon-Framework
            git am ../patches/*.patch
          else
            echo "No patches to apply."
          fi

      - name: Build universal framework
        run: |
          cd Syphon-Framework
          xcodebuild -project Syphon.xcodeproj \
            -scheme Syphon \
            -configuration Release \
            -derivedDataPath ../build \
            ONLY_ACTIVE_ARCH=NO \
            ARCHS="arm64 x86_64" \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
            clean build

      - name: Verify universal binary
        run: |
          lipo -info build/Build/Products/Release/Syphon.framework/Versions/A/Syphon
          file build/Build/Products/Release/Syphon.framework/Versions/A/Syphon

      - name: Archive framework (preserve symlinks)
        run: tar -cf syphon-universal.tar -C build/Build/Products/Release Syphon.framework

      - name: Upload universal framework
        uses: actions/upload-artifact@v4
        with:
          name: syphon-universal
          path: syphon-universal.tar

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: macos-14
    steps:
      - name: Download universal framework
        uses: actions/download-artifact@v4
        with:
          name: syphon-universal

      - name: Extract framework
        run: tar -xf syphon-universal.tar

      - name: Package release
        run: |
          TAG=${{ github.ref_name }}
          mkdir -p "Syphon_${TAG}"
          cp -R Syphon.framework "Syphon_${TAG}/"
          zip -r -y "Syphon_${TAG}.zip" "Syphon_${TAG}"

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          name: "Syphon Framework ${{ github.ref_name }}"
          body: |
            Built from Syphon Framework commit: [`${{ env.SYPHON_REVISION }}`](https://github.com/Syphon/Syphon-Framework/commit/${{ env.SYPHON_REVISION }})
          artifacts: |
            Syphon_${{ github.ref_name }}.zip
